name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      - name: End-to-end tests
        uses: cypress-io/github-action@v7
        with:
          install: false
          start: pnpm dev
          wait-on: "http://localhost:3000/login"
          wait-on-timeout: 120
          browser: chrome
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://example.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_e2e-placeholder' }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          DATABASE_SSL: require
          CYPRESS_E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          CYPRESS_E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Cypress failure screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-failure-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
